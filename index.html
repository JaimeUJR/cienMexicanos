<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/home.css">
    <title>Home</title>
</head>

<body>
    <main class="page-shell">
            <div class="container">
                <!-- Rectangles -->
                <div class="rect pink"></div>
                <div class="rect blue"></div>
                <div class="rect yellow"></div>
                <div class="rect green"></div>

                <!-- Text -->
                <div class="title">
                    <h2 class="number">100</h2>
                    <h2 class="text line-one">ADVENTISTAS</h2>
                    <h2 class="text line-two">DIJERON</h2>
                </div>
            </div>

        <section class="navigation-cards">
            <a class="nav-card" href="./pages/newGame.html">
                <h2 style="color: var(--green-bright);">Crear Partida</h2>
                <p>Inicia una nueva sesión y agrega tus preguntas para jugar.</p>
            </a>
            <a class="nav-card" href="./pages/history.html">
                <h2 style="color: var(--blue-soft);">Historial</h2>
                <p>Revisa partidas anteriores y resultados guardados.</p>
            </a>
            <a class="nav-card" href="./pages/manageGame.html">
                <h2 style="color: var(--pink-power);">Administrar Partidas</h2>
                <p>Configura rondas, equipos y opciones del tablero.</p>
            </a>
        </section>

        <section class="games-section">
            <h2>Partidas Disponibles</h2>
            <div id="games-container" class="games-container">
                <!-- Partidas se cargarán aquí -->
            </div>
        </section>
    </main>

    <script src="./js/storage.js"></script>
    <script src="./js/game.js"></script>
    <script>
        // Inicializar storage (cargar partidas guardadas)
        window.initializeStorage();
        
        // Solo crear partida de prueba si no existen partidas
        const existingGames = window.getGames();
        if (existingGames.length === 0) {
            const testGamePayload = {
                gameName: 'Partida de Prueba',
                teamAName: 'Equipo Azul',
                teamBName: 'Equipo Rojo',
                roundsCount: 3,
                enableDoubleRound: false,
                enableSounds: false,
                roundsData: [
                    // Ronda 1 - Fútbol
                    [
                        { text: 'Fútbol', points: 30 },
                        { text: 'Tennis', points: 25 },
                        { text: 'Béisbol', points: 20 },
                        { text: 'Lucha Libre', points: 15 },
                        { text: 'Básquetbol', points: 10 }
                    ],
                    // Ronda 2 - Películas
                    [
                        { text: 'Avatar', points: 35 },
                        { text: 'Titanic', points: 28 },
                        { text: 'Inception', points: 22 },
                        { text: 'Interstellar', points: 12 },
                        { text: 'Matrix', points: 8 }
                    ],
                    // Ronda 3 - Cantantes
                    [
                        { text: 'Juan Gabriel', points: 40 },
                        { text: 'Selena', points: 32 },
                        { text: 'Luis Miguel', points: 20 },
                        { text: 'Thalia', points: 15 },
                        { text: 'Reik', points: 5 }
                    ]
                ]
            };
            
            window.createGameState(testGamePayload);
        }
        
        function loadGamesInHome() {
            const games = window.getGames();
            const container = document.getElementById('games-container');
            
            if (!games || games.length === 0) {
                container.innerHTML = '<p class="empty-state">No hay partidas disponibles. Crea una nueva para empezar.</p>';
                return;
            }

            container.innerHTML = games.map(game => {
                const createdDate = new Date(game.createdAt).toLocaleDateString('es-MX');
                const teams = game.teams ? `${game.teams[0].name} vs ${game.teams[1].name}` : 'Equipos no configurados';
                
                return `
                    <div class="game-card">
                        <div class="game-card-header">
                            <h3>${game.name}</h3>
                            <span class="game-date">${createdDate}</span>
                        </div>
                        <div class="game-card-body">
                            <p class="teams">${teams}</p>
                            <p class="rounds">Rondas: ${game.config.roundsCount}</p>
                        </div>
                        <div class="game-card-actions">
                            <button class="btn btn-play" data-game-id="${game.id}">Jugar</button>
                            <button class="btn btn-hide" data-game-id="${game.id}">Ocultar</button>
                        </div>
                    </div>
                `;
            }).join('');

            // Agregar event listeners a los botones de jugar
            document.querySelectorAll('.btn-play').forEach(btn => {
                btn.addEventListener('click', function() {
                    const gameId = this.dataset.gameId;
                    window.setActiveGame(gameId);
                    window.location.href = './pages/game.html';
                });
            });

            // Agregar event listeners a los botones de ocultar
            document.querySelectorAll('.btn-hide').forEach(btn => {
                btn.addEventListener('click', function() {
                    const gameId = this.dataset.gameId;
                    // TODO: Implementar funcionalidad de ocultar
                    alert('Funcionalidad de ocultar (próximamente)');
                });
            });
        }

        // Cargar partidas al abrir el home
        document.addEventListener('DOMContentLoaded', loadGamesInHome);
        
        // Recargar partidas cuando se vuelve a la página
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                window.initializeStorage();
                loadGamesInHome();
            }
        });
    </script>
</body>

</html>
