<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/resetAndConstants.css">
    <link rel="stylesheet" href="../css/game-new.css">
    <title>Juego - 100 Adventistas Dijeron</title>
</head>
<body>
    <main class="game-page">
        <!-- Botón de cerrar en la esquina -->
        <button class="btn-close-corner" onclick="window.location.href='../index.html'">
            <span>✕</span>
        </button>

        <!-- Contenedor principal del juego -->
        <div class="game-board">
            <!-- Panel izquierdo - Equipo 1 -->
            <div class="team-panel team-left" id="team-panel-0">
                <div style="flex: 1; min-height: 124px;"></div>
                <div class="team-badge">
                    <span class="badge-score" id="team1-score">000</span>
                </div>
                <div class="team-info">
                    <h3 id="team1-name">Equipo Azul</h3>
                    <p class="total-score" id="team1-total">Total: 0</p>
                </div>
            </div>

            <!-- Área central del juego -->
            <div class="game-content">
                <!-- Decoración exterior con bolas (borde arcade) -->
                <div class="arcade-border">
                    <!-- Decoración lateral izquierda -->
                    <div class="side-decoration-left"></div>
                    <!-- Decoración lateral derecha -->
                    <div class="side-decoration-right"></div>

                    <!-- Contador superior en el tope -->
                    <div class="score-display arcade-top">
                        <span id="current-round-score">000</span>
                    </div>

                    <!-- Pregunta -->
                    <div class="question-area">
                        <h2 id="question-text">¿Pregunta 1?</h2>
                    </div>

                    <div class="steal-banner" id="steal-banner" aria-live="polite">ROBO DE PUNTOS</div>

                    <!-- Listado de respuestas - OCULTAS -->
                    <div class="answers-area arcade-board">
                        <div class="strike-overlay" id="strike-overlay" aria-live="polite">
                            <div class="strike-burst" id="strike-burst">X</div>
                        </div>
                        <div id="answers-container" class="answers-list arcade-grid">
                            <!-- Las 5 respuestas se renderizan aquí OCULTAS -->
                        </div>
                    </div>
                </div>

                <div class="bottom-controls">
                    <div class="input-shell">
                        <input 
                            type="text" 
                            id="answer-input" 
                            class="answer-input-hidden" 
                            placeholder="Ingresa la respuesta"
                            autocomplete="off"
                        >
                    </div>

                    <div class="strike-count" id="strike-count" aria-live="polite">
                        <span class="strike-mark" data-strike-index="1">X</span>
                        <span class="strike-mark" data-strike-index="2">X</span>
                        <span class="strike-mark" data-strike-index="3">X</span>
                    </div>

                    <button class="btn-pause" id="btn-pause">Pausar Partida</button>
                </div>
            </div>

            <!-- Panel derecho - Equipo 2 -->
            <div class="team-panel team-right" id="team-panel-1">
                <div style="flex: 1; min-height: 124px;"></div>
                <div class="team-badge">
                    <span class="badge-score" id="team2-score">000</span>
                </div>
                <div class="team-info">
                    <h3 id="team2-name">Equipo Rojo</h3>
                    <p class="total-score" id="team2-total">Total: 0</p>
                </div>
            </div>
        </div>

        <!-- Modal de fin de juego -->
        <div id="game-end-modal" class="modal hidden">
            <div class="modal-content">
                <h2>¡Juego Finalizado!</h2>
                <div id="final-scores" class="final-scores">
                    <!-- Puntuaciones finales -->
                </div>
                <div class="final-actions">
                    <button class="btn-primary" id="btn-replay">Volver a Jugar</button>
                    <button class="btn-modal-secondary" id="btn-back-home">Volver al inicio/menu</button>
                </div>
            </div>
        </div>

        <div id="pause-modal" class="modal hidden">
            <div class="modal-content pause-modal-content">
                <h2>Partida en Pausa</h2>
                <p>La partida esta pausada. Presiona para continuar.</p>
                <button class="btn-primary" id="btn-resume">Reanudar Partida</button>
            </div>
        </div>

        <div id="start-team-modal" class="modal hidden">
            <div class="modal-content start-team-modal-content">
                <h2>¿Que equipo inicia?</h2>
                <p>Selecciona el equipo que tendra el primer turno.</p>
                <div class="start-team-actions">
                    <button class="btn-primary" id="btn-start-team-0">Equipo 1</button>
                    <button class="btn-modal-secondary" id="btn-start-team-1">Equipo 2</button>
                </div>
            </div>
        </div>
    </main>

    <script src="../js/storage.js"></script>
    <script src="../js/game.js"></script>
    <script src="../js/gamePlay.js"></script>
</body>
</html>
